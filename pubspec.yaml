name: tagme
description: Find ride-sharing partners among nearby students
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  flutter_map_marker_cluster: ^8.2.2
  geolocator: ^14.0.2
  permission_handler: ^12.0.1
  geoflutterfire_plus: ^0.0.34
  firebase_core: ^4.6.0
  cloud_firestore: ^6.2.0
  firebase_storage: ^13.2.0
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  go_router: ^17.1.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  cached_network_image: ^3.4.1
  image_picker: ^1.2.1
  google_fonts: ^6.2.1
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.13.1
  riverpod_generator: ^4.0.3
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  very_good_analysis: ^7.0.0

flutter:
  uses-material-design: true
